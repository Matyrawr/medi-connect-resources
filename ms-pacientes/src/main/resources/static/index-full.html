<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gestión de Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body{padding:20px;background:#f5f7fb}
      .card{border-radius:12px}
      .muted{color:#6c757d}
      pre{background:#0d1117;color:#e6eef8;padding:12px;border-radius:8px}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="d-flex align-items-center mb-4">
        <div class="me-3"><img src="https://img.icons8.com/fluency/48/000000/appointment-reminders.png" alt="logo"></div>
        <div>
          <h1 class="h3 mb-0">Gestión de Citas</h1>
          <div class="muted">Interfaz mínima para crear y administrar citas</div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <div class="card p-3">
            <h5>Crear doctor</h5>
            <form id="doctorForm" class="row g-2">
              <div class="col-12"><input name="nombre" class="form-control" placeholder="Nombre" required></div>
              <div class="col-6"><input name="especialidad" class="form-control" placeholder="Especialidad"></div>
              <div class="col-3"><input name="horaInicio" class="form-control" type="time" value="08:00"></div>
              <div class="col-3"><input name="horaFin" class="form-control" type="time" value="17:00"></div>
              <div class="col-6"><input name="duracionCita" class="form-control" type="number" value="30"></div>
              <div class="col-6 text-end"><button class="btn btn-primary">Crear doctor</button></div>
            </form>
          </div>

          <div class="card p-3 mt-3">
            <h5>Crear paciente</h5>
            <form id="pacienteForm" class="row g-2">
              <div class="col-12"><input name="nombre" class="form-control" placeholder="Nombre" required></div>
              <div class="col-6"><input name="email" class="form-control" placeholder="Email" type="email"></div>
              <div class="col-6"><input name="telefono" class="form-control" placeholder="Teléfono"></div>
              <div class="col-12 text-end"><button class="btn btn-success">Crear paciente</button></div>
            </form>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card p-3">
            <h5>Consultar disponibilidad</h5>
            <form id="dispForm" class="row g-2 align-items-end">
              <div class="col-4"><input name="doctorId" class="form-control" placeholder="Doctor ID" type="number" required></div>
              <div class="col-4"><input name="fecha" class="form-control" type="date" required></div>
              <div class="col-4 text-end"><button class="btn btn-outline-primary">Ver disponibilidad</button></div>
            </form>
            <hr>
            <h5 class="mt-2">Agendar cita</h5>
            <form id="citaForm" class="row g-2">
              <div class="col-6"><input name="pacienteId" class="form-control" placeholder="Paciente ID" type="number" required></div>
              <div class="col-6"><input name="doctorId" class="form-control" placeholder="Doctor ID" type="number" required></div>
              <div class="col-7"><input name="fechaHora" class="form-control" type="datetime-local" required></div>
              <div class="col-5"><input name="motivo" class="form-control" placeholder="Motivo"></div>
              <div class="col-12 text-end"><button class="btn btn-primary">Agendar</button></div>
            </form>
            <hr>
            <h5 class="mt-2">Cancelar cita</h5>
            <form id="cancelForm" class="row g-2">
              <div class="col-6"><input name="citaId" class="form-control" placeholder="Cita ID" type="number" required></div>
              <div class="col-6 text-end"><button class="btn btn-danger">Cancelar</button></div>
            </form>
          </div>
        </div>
      </div>

      <div class="mt-4">
        <div class="card p-3">
          <h5>Salida / Respuesta</h5>
          <div id="output" class="mt-2"><pre id="outputPre">Aquí aparecerán las respuestas</pre></div>
        </div>
      </div>
    </div>

    <script>
      const out = (status, data) => {
        const pre = document.getElementById('outputPre');
        pre.textContent = 'Status: ' + status + '\n' + (typeof data === 'string' ? data : JSON.stringify(data, null, 2));
      };

      async function postJson(url, data){
        const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json; charset=utf-8'}, body: JSON.stringify(data)});
        const text = await res.text();
        try { return [res.status, JSON.parse(text)]; } catch(e){ return [res.status, text]; }
      }

      document.getElementById('doctorForm').addEventListener('submit', async e => {
        e.preventDefault();
        const f = e.target;
        const data = { nombre:f.nombre.value, especialidad:f.especialidad.value, horaInicio:f.horaInicio.value, horaFin:f.horaFin.value, duracionCita: Number(f.duracionCita.value) };
        const [status, body] = await postJson('http://localhost:8082/api/doctores', data);
        out(status, body);
      });

      document.getElementById('pacienteForm').addEventListener('submit', async e => {
        e.preventDefault();
        const f = e.target;
        const data = { nombre:f.nombre.value, email:f.email.value, telefono:f.telefono.value };
        const [status, body] = await postJson('http://localhost:8081/api/pacientes', data);
        out(status, body);
      });

      document.getElementById('dispForm').addEventListener('submit', async e => {
        e.preventDefault();
        const f = e.target; const id = f.doctorId.value; const fecha = f.fecha.value;
        const res = await fetch(`http://localhost:8082/api/doctores/${id}/disponibilidad?fecha=${fecha}`);
        let body;
        try { body = await res.json(); } catch(e) { body = await res.text(); }
        out(res.status, body);
      });

      document.getElementById('citaForm').addEventListener('submit', async e => {
        e.preventDefault();
        const f = e.target;
        let dt = f.fechaHora.value;
        if(dt && dt.length === 16) dt = dt + ':00';
        const data = { pacienteId: Number(f.pacienteId.value), doctorId: Number(f.doctorId.value), fechaHora: dt, motivo: f.motivo.value };
        const [status, body] = await postJson('http://localhost:8083/api/citas', data);
        out(status, body);
      });

      document.getElementById('cancelForm').addEventListener('submit', async e => {
        e.preventDefault();
        const id = e.target.citaId.value;
        const res = await fetch(`http://localhost:8083/api/citas/${id}/cancelar`, {method:'PUT'});
        const text = await res.text();
        out(res.status, text || (res.status===200? 'Cancelada' : ''));
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
